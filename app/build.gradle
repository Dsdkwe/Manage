
apply plugin: 'com.android.application'

android {
    namespace 'com.manage.renderer'
    compileSdk 34
    defaultConfig {
        applicationId "com.manage.renderer"
        minSdk 30
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}
